name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoppler-cpp0v5 libssl-dev build-essential curl

      - name: Install machin
        run: |
          gh release download v0.108.0 -R javimosch/machin -p 'machin-v0.108.0-linux-amd64'
          chmod +x machin-v0.108.0-linux-amd64
          sudo mv machin-v0.108.0-linux-amd64 /usr/local/bin/machin
          machin help >/dev/null
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Start Qdrant
        run: docker compose up -d

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:6333/readyz && exit 0
            sleep 1
          done
          echo "Qdrant not ready"; exit 1

      - name: Build
        run: ./build.sh

      - name: Smoke
        run: chmod +x scripts/smoke.sh && ./scripts/smoke.sh

      - name: Eval hash + synonyms (report; non-blocking)
        run: |
          chmod +x scripts/eval_hash.py scripts/eval_synonyms.py
          python3 scripts/eval_hash.py || true
          python3 scripts/eval_synonyms.py || true
